services:
  - type: web
    name: pharmaquiz-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: bot.db
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
